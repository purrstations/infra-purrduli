%% Static ACL rules. Device authenticated as username X can only
%% publish/subscribe under purrtein/devices/X/#. See emqx.conf's
%% authorization block (type=file) and CLAUDE.md's MQTT topic contract
%% in the iot repo.
%%
%% ${username} is resolved per-connection at authz-check time.

{allow, all, publish,   ["purrtein/devices/${username}/#"]}.
{allow, all, subscribe, ["purrtein/devices/${username}/#"]}.

{deny, all}.
