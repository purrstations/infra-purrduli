%% Static ACL rules — device (authenticated via username = DEVICE_ID) can only
%% publish/subscribe under its own topic branch. See emqx.conf's `authorization`
%% block (type=file source) and CLAUDE.md's MQTT topic contract in the iot repo.
%%
%% ${username} is resolved per-connection at authz-check time — feeder-1 can
%% only touch purrtein/devices/feeder-1/#, feeder-2 only its own, etc.

{allow, {user, _}, publish,   ["purrtein/devices/${username}/#"]}.
{allow, {user, _}, subscribe, ["purrtein/devices/${username}/#"]}.

{deny, all}.
