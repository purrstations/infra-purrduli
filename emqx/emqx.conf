# EMQX config untuk Purrtein MQTT broker

node {
  name = "emqx@127.0.0.1"
  cookie = "${EMQX_NODE_COOKIE}"
  data_dir = "/opt/emqx/data"
}

# Listener MQTT plain
listeners.tcp.default {
  bind = "0.0.0.0:1883"
}

# Listener MQTT over TLS — aktifkan setelah SSL cert tersedia
# listeners.ssl.default {
#   bind = "0.0.0.0:8883"
#   ssl_options {
#     certfile = "/etc/letsencrypt/live/purrduli.tech/fullchain.pem"
#     keyfile  = "/etc/letsencrypt/live/purrduli.tech/privkey.pem"
#   }
# }

# Auth — username/password per device
authentication = [
  {
    mechanism = password_based
    backend = built_in_database
    enable = true
  }
]

# ACL — device hanya bisa akses topic miliknya sendiri
authorization {
  sources = [
    { type = built_in_database, enable = true }
  ]
  no_match = deny
  deny_action = disconnect
}
