logLevel: debug

api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554

hls: yes
hlsAddress: :8888

webrtc: yes
webrtcAddress: :8889

# Auth
authMethod: internal
authInternalUsers:
  # User spesifik duluan — kalau `any` di-cek lebih dulu, request yang
  # bawa kredensial purrtein ke-match ke `any` duluan (yang cuma boleh
  # read) dan publish ke-reject 401 sebelum sempat dicek ke rule ini.
  - user: purrtein
    pass: ${MEDIAMTX_PASS}
    permissions:
      - action: publish
      - action: playback
      - action: api
      - action: metrics
      - action: pprof

  # Publik boleh nonton stream (WebRTC page) tanpa login sama sekali.
  - user: any
    pass:
    ips: []
    permissions:
      - action: read

paths:
  "~^feeder-[0-9]+$": {}
