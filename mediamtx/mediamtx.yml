logLevel: debug

api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554

hls: yes
hlsAddress: :8888

webrtc: yes
webrtcAddress: :8889

# Auth
authMethod: internal
authInternalUsers:
  # Publish diizinkan berdasarkan IP docker network internal, bukan
  # username/password -- ffmpeg (mjpeg-ingest-server) berulang kali kena
  # 401 di ANNOUNCE meski kredensial sudah benar & rtspAuthMethods default
  # basic; ini keterbatasan/quirk RTSP output-muxer ffmpeg, bukan salah
  # config mediamtx. IP-based auth sidestep masalah itu karena gak perlu
  # challenge-response sama sekali. Tetap aman: 172.16.0.0/12 cuma
  # reachable dari dalam docker bridge network host ini, bukan internet.
  - user: any
    ips: ["172.16.0.0/12", "127.0.0.1"]
    permissions:
      - action: publish
      - action: playback
      - action: api
      - action: metrics
      - action: pprof

  # Publik boleh nonton stream (WebRTC page) tanpa login sama sekali.
  - user: any
    ips: []
    permissions:
      - action: read

paths:
  "~^feeder-[0-9]+$": {}
