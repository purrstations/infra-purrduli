logLevel: info

api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554

hls: yes
hlsAddress: :8888

webrtc: yes
webrtcAddress: :8889

# Auth
authMethod: internal
authInternalUsers:
  # Publik boleh nonton stream (WebRTC page) tanpa login sama sekali.
  - user: any
    pass:
    ips: []
    permissions:
      - action: read

  # Kredensial dipakai mjpeg-ingest-server buat publish RTSP, plus akses
  # api/metrics/pprof buat debugging.
  - user: purrtein
    pass: ${MEDIAMTX_PASS}
    permissions:
      - action: publish
      - action: playback
      - action: api
      - action: metrics
      - action: pprof

paths:
  "~^feeder-[0-9]+$": {}
