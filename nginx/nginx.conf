events {}

http {
    # redirect HTTP ke HTTPS
    server {
        listen 80;
        server_name purrduli.tech api.purrduli.tech stream.purrduli.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # frontend — coming soon sementara
    server {
        listen 443 ssl;
        server_name purrduli.tech;

        ssl_certificate /etc/letsencrypt/live/purrduli.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/purrduli.tech/privkey.pem;

        location / {
            return 200 '<html><body style="background:#0f0f0f;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center;flex-direction:column"><h1>purr<span style="color:#f97316">duli</span>.tech</h1><p style="color:#aaa;margin-top:1rem">Sesuatu yang keren sedang disiapkan. Tunggu ya!</p></body></html>';
            add_header Content-Type text/html;
        }
    }

    # backend API — akan diaktifkan setelah backend siap
    server {
        listen 443 ssl;
        server_name api.purrduli.tech;

        ssl_certificate /etc/letsencrypt/live/purrduli.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/purrduli.tech/privkey.pem;

        location / {
            return 503 '{"message":"coming soon"}';
            add_header Content-Type application/json;
        }
    }

    # mediamtx
    server {
        listen 443 ssl;
        server_name stream.purrduli.tech;

        ssl_certificate /etc/letsencrypt/live/purrduli.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/purrduli.tech/privkey.pem;

        location / {
            proxy_pass http://mediamtx:8889;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
