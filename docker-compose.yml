services:
  # backend:
  #   image: ghcr.io/purrtein/backend:latest
  #   env_file: .env
  #   restart: unless-stopped
  #   networks:
  #     - internal

  # frontend:
  #   image: ghcr.io/purrtein/frontend:latest
  #   restart: unless-stopped
  #   networks:
  #     - internal

  mqtt:
    image: emqx/emqx:latest
    restart: unless-stopped
    env_file: .env
    # EMQX runs as uid 1000 (non-root) — it can't read certbot's default
    # root-only privkey even with the volume mounted. group_add gives this
    # container supplementary GID 10001, which fix-cert-perms.sh (run by the
    # certbot service) grants read access to. See certbot/fix-cert-perms.sh.
    group_add:
      - "10001"
    ports:
      - "1883:1883"             # MQTT plain (bisa di-close setelah testing)
      - "8883:8883"             # MQTT over TLS
      - "127.0.0.1:18083:18083" # EMQX dashboard — localhost only
    volumes:
      - emqx_data:/opt/emqx/data
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - ./emqx/acl.conf:/opt/emqx/etc/acl.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - internal

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "8554:8554"       # RTSP
      - "8888:8888"       # HLS
      - "8889:8889"       # WebRTC HTTP
      # - "8890:8890/udp"   # WebRTC UDP — pakai ephemeral ports
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml
    networks:
      - internal

  mjpeg-ingest:
    build: ./mjpeg-ingest-server
    restart: unless-stopped
    env_file: .env
    environment:
      MEDIAMTX_HOST: mediamtx        # nama service di network `internal`, bukan 127.0.0.1
      MEDIAMTX_RTSP_PORT: 8554
      MEDIAMTX_USER: purrtein        # cocok dengan authInternalUsers di mediamtx.yml
    ports:
      - "8080:8080"                  # ESP32 push ke sini
    depends_on:
      - mediamtx
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - internal

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./certbot/fix-cert-perms.sh:/fix-cert-perms.sh:ro
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        sh /fix-cert-perms.sh;
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  emqx_data:

networks:
  internal:
    driver: bridge
