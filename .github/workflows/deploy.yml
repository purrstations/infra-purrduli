name: Deploy Infra

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — perlu untuk diff yang akurat

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Validasi key valid
          ssh-keygen -l -f ~/.ssh/deploy_key

      - name: Deploy ke VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o PasswordAuthentication=no \
            $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            cd /app/purrtein-infra

            BEFORE=$(git rev-parse HEAD)
            git pull origin main
            AFTER=$(git rev-parse HEAD)

            if [ "$BEFORE" = "$AFTER" ]; then
              echo "Tidak ada perubahan baru, skip deploy."
              exit 0
            fi

            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
            echo "File berubah:"
            echo "$CHANGED"

            # full redeploy kalau docker-compose.yml berubah
            if echo "$CHANGED" | grep -q "^docker-compose"; then
              echo "==> Full redeploy..."
              docker compose pull
              docker compose up -d --remove-orphans
            else
              # restart selektif
              if echo "$CHANGED" | grep -q "^nginx/"; then
                echo "==> Reload nginx..."
                docker compose exec nginx nginx -s reload
              fi

              if echo "$CHANGED" | grep -q "^mediamtx/"; then
                echo "==> Restart mediamtx..."
                docker compose restart mediamtx
              fi

              if echo "$CHANGED" | grep -q "^emqx/"; then
                echo "==> Restart mqtt..."
                docker compose restart mqtt
              fi
            fi

            # health check
            echo "==> Verifikasi containers..."
            sleep 5
            docker compose ps --format "table {{.Name}}\t{{.Status}}"

            # gagal kalau ada container yang tidak running
            UNHEALTHY=$(docker compose ps --format "{{.Name}} {{.Status}}" | grep -v "Up" | grep -v "running" || true)
            if [ -n "$UNHEALTHY" ]; then
              echo "PERINGATAN: container tidak sehat:"
              echo "$UNHEALTHY"
              exit 1
            fi

            echo "Deploy selesai."
          ENDSSH
